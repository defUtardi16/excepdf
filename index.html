<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diversity - Perilaku Organisasi</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background-color: #FFFFF0;
    font-family: 'Georgia', serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 1280px;
    height: 720px;
  }

  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    color: #1a1a1a;
  }

  .label-matkul {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #3a3a3a;
    margin-bottom: 18px;
    font-family: 'Arial', sans-serif;
  }

  .divider-top {
    width: 60px;
    height: 1px;
    background-color: #1a1a1a;
    margin: 0 auto 24px auto;
  }

  .title-main {
    font-size: 88px;
    font-weight: 700;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: #111111;
    line-height: 1;
    font-family: 'Georgia', serif;
  }

  .divider-bottom {
    width: 120px;
    height: 2px;
    background-color: #1a1a1a;
    margin: 28px auto;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #2a2a2a;
    font-family: 'Arial', sans-serif;
    margin-bottom: 8px;
  }

  .group-name {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 2px;
    color: #4a4a4a;
    font-family: 'Arial', sans-serif;
  }
</style>
</head>
<body>
<canvas id="plexus"></canvas>

<div class="content">
  <p class="label-matkul">Perilaku Organisasi</p>
  <div class="divider-top"></div>
  <h1 class="title-main">Diversity</h1>
  <div class="divider-bottom"></div>
  <p class="subtitle">Mata Kuliah Perilaku Organisasi</p>
  <p class="group-name">Kelompok Alep Hama</p>
</div>

<script>
  const canvas = document.getElementById('plexus');
  const ctx = canvas.getContext('2d');
  canvas.width = 1280;
  canvas.height = 720;

  const NODE_COUNT = 80;
  const MAX_DIST = 160;
  const NODE_COLOR = 'rgba(20, 20, 20,';
  const LINE_COLOR = 'rgba(20, 20, 20,';

  const nodes = [];

  for (let i = 0; i < NODE_COUNT; i++) {
    nodes.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      r: Math.random() * 2 + 1
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MAX_DIST) {
          const alpha = (1 - dist / MAX_DIST) * 0.35;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = LINE_COLOR + alpha + ')';
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
    }

    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = NODE_COLOR + '0.6)';
      ctx.fill();
    }
  }

  function update() {
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
      if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  loop();
</script>
</body>
</html>
