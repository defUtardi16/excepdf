<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diversity · Perilaku Organisasi</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    width:100%;height:100%;overflow:hidden;
    background:radial-gradient(ellipse at 30% 20%,#fefcf5 0%,#faf6ec 40%,#f4ede2 80%,#ede4d8 100%);
    font-family:'Georgia','Times New Roman',serif;
  }
  canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0;z-index:1}

  .stage{
    position:fixed;top:0;left:0;width:100%;height:100%;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    z-index:2;pointer-events:none;user-select:none;
  }

  .label-top{
    font-family:'Arial','Helvetica Neue',sans-serif;
    font-size:clamp(0.55rem,1.2vw,0.85rem);
    font-weight:400;
    letter-spacing:0.38em;
    text-transform:uppercase;
    color:rgba(20,18,14,0.38);
    margin-bottom:1.4em;
    transition:color 0.6s ease;
  }
  .label-top.glow{color:rgba(20,18,14,0.62)}

  .divider-short{
    width:48px;height:1px;
    background:rgba(20,18,14,0.22);
    margin:0 auto 1.8em auto;
    transition:background 0.6s ease;
  }
  .divider-short.glow{background:rgba(20,18,14,0.45)}

  .title{
    font-size:clamp(4rem,13vw,8.5rem);
    font-weight:700;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:rgba(15,13,10,0.72);
    line-height:1;
    text-shadow:0 0 40px rgba(20,18,14,0.06),0 0 80px rgba(20,18,14,0.04);
    transition:color 0.6s ease,text-shadow 0.6s ease;
  }
  .title.glow{
    color:rgba(15,13,10,0.92);
    text-shadow:
      0 0 30px rgba(20,18,14,0.18),
      0 0 70px rgba(20,18,14,0.10);
  }

  .divider-long{
    width:110px;height:1.5px;
    background:rgba(20,18,14,0.18);
    margin:1.8em auto;
    transition:background 0.6s ease;
  }
  .divider-long.glow{background:rgba(20,18,14,0.40)}

  .meta{
    display:flex;flex-direction:column;align-items:center;gap:0.55em;
  }
  .meta-matkul{
    font-family:'Arial','Helvetica Neue',sans-serif;
    font-size:clamp(0.6rem,1.3vw,0.9rem);
    font-weight:300;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:rgba(20,18,14,0.35);
    transition:color 0.6s ease;
  }
  .meta-matkul.glow{color:rgba(20,18,14,0.58)}
  .meta-group{
    font-family:'Arial','Helvetica Neue',sans-serif;
    font-size:clamp(0.55rem,1.1vw,0.78rem);
    font-weight:300;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:rgba(20,18,14,0.25);
    transition:color 0.6s ease;
  }
  .meta-group.glow{color:rgba(20,18,14,0.45)}

  .clock-wrap{
    position:fixed;bottom:2.4em;right:3em;
    z-index:2;pointer-events:none;user-select:none;
    text-align:right;
  }
  .clock-time{
    font-family:'Arial','Helvetica Neue',sans-serif;
    font-size:clamp(1rem,2.2vw,1.5rem);
    font-weight:200;
    letter-spacing:0.14em;
    color:rgba(20,18,14,0.28);
    font-feature-settings:"tnum";
    transition:color 0.6s ease;
  }
  .clock-time .colon{
    animation:colonPulse 2s ease-in-out infinite;
    display:inline-block;
    margin:0 0.04em;
  }
  .clock-date{
    font-family:'Arial','Helvetica Neue',sans-serif;
    font-size:clamp(0.5rem,1vw,0.7rem);
    font-weight:300;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:rgba(20,18,14,0.20);
    margin-top:0.35em;
    transition:color 0.6s ease;
  }

  @keyframes colonPulse{
    0%,100%{opacity:0.6}
    50%{opacity:0.15}
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="stage">
  <div class="label-top" id="labelTop">Perilaku Organisasi</div>
  <div class="divider-short" id="divShort"></div>
  <div class="title" id="titleMain">Diversity</div>
  <div class="divider-long" id="divLong"></div>
  <div class="meta">
    <div class="meta-matkul" id="metaMatkul">Mata Kuliah Perilaku Organisasi</div>
    <div class="meta-group" id="metaGroup">Kelompok Alep Hama</div>
  </div>
</div>

<div class="clock-wrap">
  <div class="clock-time" id="clockTime"></div>
  <div class="clock-date" id="clockDate"></div>
</div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const dpi    = window.devicePixelRatio || 1;
  const mouse  = {x:-9999,y:-9999};
  let W=0,H=0,nodes=[];

  const isMobile = ()=> window.innerWidth < 768;

  const CFG = {
    countD:90, countM:50,
    distD:185, distM:125,
    influence:170, pull:0.0022, repelNear:40, repelForce:0.000018,
    bloomDist:110,
    baseLineW:0.7, bloomLineBoost:0.28, maxLineW:1.9,
    // coal black node/line base color
    baseR:18, baseG:16, baseB:14
  };

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W * dpi;
    canvas.height = H * dpi;
    canvas.style.width  = W+'px';
    canvas.style.height = H+'px';
    ctx.setTransform(dpi,0,0,dpi,0,0);
    initNodes();
  }

  function initNodes(){
    const count = isMobile() ? CFG.countM : CFG.countD;
    nodes = Array.from({length:count},()=>({
      x:Math.random(), y:Math.random(),
      z:0.3+Math.random()*0.7,
      vx:(Math.random()-0.5)*0.00036,
      vy:(Math.random()-0.5)*0.00036,
      baseSize:0.3+Math.random()*1.0
    }));
  }

  // clock
  const clockTimeEl = document.getElementById('clockTime');
  const clockDateEl = document.getElementById('clockDate');
  const dayNames    = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const monthNames  = ['Januari','Februari','Maret','April','Mei','Juni',
                       'Juli','Agustus','September','Oktober','November','Desember'];
  const pad = n=> n<10?'0'+n:''+n;

  function updateClock(){
    const now=new Date();
    const h=pad(now.getHours()),m=pad(now.getMinutes()),s=pad(now.getSeconds());
    clockTimeEl.innerHTML=h+'<span class="colon">:</span>'+m+'<span class="colon">:</span>'+s;
    clockDateEl.textContent=dayNames[now.getDay()]+', '+now.getDate()+' '+monthNames[now.getMonth()]+' '+now.getFullYear();
  }
  setInterval(updateClock,500);
  updateClock();

  // glow toggle refs
  const glowEls=[
    document.getElementById('labelTop'),
    document.getElementById('divShort'),
    document.getElementById('titleMain'),
    document.getElementById('divLong'),
    document.getElementById('metaMatkul'),
    document.getElementById('metaGroup'),
  ];
  let nearCenter=false;

  function checkGlow(){
    const cx=W/2,cy=H/2;
    const d=Math.sqrt((mouse.x-cx)**2+(mouse.y-cy)**2);
    const near=d<280;
    if(near!==nearCenter){
      nearCenter=near;
      glowEls.forEach(el=>el.classList.toggle('glow',near));
    }
  }

  function animate(){
    ctx.clearRect(0,0,W,H);
    const mx=mouse.x,my=mouse.y;
    const MAX_DIST=isMobile()?CFG.distM:CFG.distD;
    const {baseR:bR,baseG:bG,baseB:bB}=CFG;

    for(const n of nodes){
      const px=n.x*W,py=n.y*H;
      const dx=mx-px,dy=my-py;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      if(dist<CFG.influence){
        const f=(CFG.influence-dist)/CFG.influence;
        n.vx+=(dx/dist)*f*CFG.pull/W;
        n.vy+=(dy/dist)*f*CFG.pull/H;
      }
      if(dist<CFG.repelNear){
        n.vx-=(dx/dist)*CFG.repelForce;
        n.vy-=(dy/dist)*CFG.repelForce;
      }
      n.vx*=0.989; n.vy*=0.989;
      const sf=0.8+n.z*0.4;
      let nx=n.x+n.vx*sf, ny=n.y+n.vy*sf;
      if(nx<0){n.vx*=-0.5;nx=0} if(nx>1){n.vx*=-0.5;nx=1}
      if(ny<0){n.vy*=-0.5;ny=0} if(ny>1){n.vy*=-0.5;ny=1}
      n.x=nx; n.y=ny;
    }

    // lines
    for(let i=0;i<nodes.length;i++){
      const a=nodes[i];
      const ax=a.x*W,ay=a.y*H;
      for(let j=i+1;j<nodes.length;j++){
        const b=nodes[j];
        const bx=b.x*W,by=b.y*H;
        const dx=ax-bx,dy=ay-by;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<MAX_DIST){
          const t=1-d/MAX_DIST;
          const dA=Math.sqrt((ax-mx)**2+(ay-my)**2);
          const dB=Math.sqrt((bx-mx)**2+(by-my)**2);
          const nm=Math.min(dA,dB);
          const bloom=nm<CFG.bloomDist
            ?1+(1-nm/CFG.bloomDist)*1.6
            :nm<CFG.bloomDist*2
              ?1+(1-nm/(CFG.bloomDist*2))*0.35
              :1;
          const depthAvg=(a.z+b.z)*0.5;
          const df=0.65+depthAvg*0.5;
          let alpha=Math.min(t*0.55*bloom*df,0.82);

          if(bloom>1.2){
            const grad=ctx.createLinearGradient(ax,ay,bx,by);
            const r=Math.min(bR+15,48),g=Math.min(bG+12,40),bb=Math.min(bB+10,36);
            grad.addColorStop(0,  `rgba(${r},${g},${bb},${alpha*0.65})`);
            grad.addColorStop(0.5,`rgba(${r+8},${g+6},${bb+5},${alpha})`);
            grad.addColorStop(1,  `rgba(${r},${g},${bb},${alpha*0.65})`);
            ctx.strokeStyle=grad;
            ctx.lineWidth=Math.min(CFG.baseLineW+bloom*CFG.bloomLineBoost,CFG.maxLineW);
            ctx.shadowBlur=bloom>1.7?8:3;
            ctx.shadowColor=`rgba(${bR},${bG},${bB},${Math.min(bloom*0.12,0.25)})`;
          } else {
            ctx.strokeStyle=`rgba(${bR},${bG},${bB},${alpha*0.88})`;
            ctx.lineWidth=CFG.baseLineW*(0.88+depthAvg*0.28);
            ctx.shadowBlur=0;
          }
          ctx.beginPath();
          ctx.moveTo(ax,ay);
          ctx.lineTo(bx,by);
          ctx.stroke();
        }
      }
    }
    ctx.shadowBlur=0;

    // nodes
    for(const n of nodes){
      const px=n.x*W,py=n.y*H;
      const nm=Math.sqrt((px-mx)**2+(py-my)**2);
      const bloom=nm<CFG.bloomDist
        ?1+(1-nm/CFG.bloomDist)*1.5
        :nm<CFG.bloomDist*2
          ?1+(1-nm/(CFG.bloomDist*2))*0.28
          :1;
      const ds=0.65+n.z*0.6;
      const r=Math.min(n.baseSize*bloom*ds,2.6);
      const alpha=Math.min(0.55+0.22*bloom*n.z,0.82);
      if(bloom>1.35){
        ctx.shadowBlur=6+bloom*2;
        ctx.shadowColor=`rgba(${bR},${bG},${bB},${Math.min(bloom*0.12,0.28)})`;
      } else {
        ctx.shadowBlur=0;
      }
      ctx.fillStyle=`rgba(${bR},${bG},${bB},${alpha})`;
      ctx.beginPath();
      ctx.arc(px,py,r,0,Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur=0;

    checkGlow();
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize',resize);
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});
  window.addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999});
  window.addEventListener('touchmove',e=>{
    if(e.touches.length){mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY}
  },{passive:true});
  window.addEventListener('touchend',()=>{mouse.x=-9999;mouse.y=-9999});

  resize();
  animate();
})();
</script>
</body>
</html>
